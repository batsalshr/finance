{% extends 'base.html' %}

{% block title %}Delete Category - Finance Tracker{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-body text-center py-5">
                    <div class="text-danger mb-4">
                        <i class="bi bi-exclamation-triangle display-4"></i>
                    </div>
                    <h5>Delete Category?</h5>
                    <p class="text-muted">
                        Are you sure you want to delete <strong>{{ object.name }}</strong>?
                    </p>
                    <p class="text-danger small">
                        Transactions using this category will be uncategorized.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <a href="{% url 'categories:list' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-2"></i>Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
