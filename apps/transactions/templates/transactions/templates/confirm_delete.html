{% extends 'base.html' %}

{% block title %}Delete Template - Finance Tracker{% endblock %}

{% block content %}
<div class="delete-container">
    <div class="delete-card">
        <div class="delete-icon">
            <i class="bi bi-trash"></i>
        </div>
        <h5>Delete Template?</h5>
        <p>Are you sure you want to delete "<strong>{{ object.name }}</strong>"?</p>
        <p class="text-muted small">This won't affect any transactions already created from this template.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="delete-actions">
                <a href="{% url 'transactions:template_list' %}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash me-2"></i>Delete
                </button>
            </div>
        </form>
    </div>
</div>

<style>
.delete-container {
    max-width: 400px;
    margin: 40px auto;
}

.delete-card {
    background: white;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    padding: 32px;
    text-align: center;
}

.delete-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #fef2f2;
    color: #dc2626;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
}

.delete-card h5 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
}

.delete-card p {
    color: #6b7280;
    margin-bottom: 24px;
}

.delete-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}
</style>
{% endblock %}
